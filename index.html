<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Africa Free Routing - Donate</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            text-align: center;
            color: #ffb703;
        }
        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 32px;
            font-size: 0.95rem;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
        }
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #ffb703;
            background: rgba(255, 255, 255, 0.12);
        }
        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .amount-display {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            color: #ffb703;
            margin: 24px 0;
        }
        .amount-display span {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 400;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ffb703 0%, #fb8500 100%);
            color: #1a1a2e;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 183, 3, 0.3);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .qr-container {
            display: none;
            margin-top: 30px;
            text-align: center;
        }
        .qr-container.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #qrcode {
            display: inline-block;
            padding: 16px;
            background: #fff;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        #qrcode canvas {
            display: block;
        }
        .invoice-text {
            background: rgba(255, 255, 255, 0.08);
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.75rem;
            word-break: break-all;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 16px;
            max-height: 80px;
            overflow-y: auto;
        }
        .btn-copy {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 24px;
        }
        .btn-copy:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        .btn-copy.copied {
            background: #22c55e;
            border-color: #22c55e;
        }
        .error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 0.9rem;
            display: none;
        }
        .error.show {
            display: block;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        .loading.show {
            display: block;
        }
        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #ffb703;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .footer {
            margin-top: 40px;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
        }
        .footer a {
            color: #ffb703;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Africa Free Routing</h1>
        <p class="subtitle">Support Bitcoin Lightning payments in Africa</p>
        
        <div class="input-group">
            <label for="username">Blink Username</label>
            <input type="text" id="username" placeholder="Enter Blink username" value="pretyflaco">
        </div>
        
        <div class="amount-display">
            100 <span>sats</span>
        </div>
        
        <button class="btn btn-primary" id="generateBtn" onclick="generateInvoice()">
            Generate Invoice
        </button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <span>Creating Lightning invoice...</span>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="qr-container" id="qrContainer">
            <div id="qrcode"></div>
            <div class="invoice-text" id="invoiceText"></div>
            <button class="btn btn-copy" id="copyBtn" onclick="copyInvoice()">
                Copy Invoice
            </button>
        </div>
        
        <div class="footer">
            Powered by <a href="https://blink.sv" target="_blank">Blink</a>
        </div>
    </div>

    <script>
        let currentInvoice = '';

        async function generateInvoice() {
            const username = document.getElementById('username').value.trim();
            const generateBtn = document.getElementById('generateBtn');
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const qrContainer = document.getElementById('qrContainer');
            const qrcode = document.getElementById('qrcode');
            const invoiceText = document.getElementById('invoiceText');

            if (!username) {
                showError('Please enter a Blink username');
                return;
            }

            error.classList.remove('show');
            qrContainer.classList.remove('show');
            generateBtn.disabled = true;
            loading.classList.add('show');

            try {
                const response = await fetch('https://api.blink.sv/graphql', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        query: `
                            mutation CreateInvoice($input: LnInvoiceCreateOnBehalfOfRecipientInput!) {
                                lnInvoiceCreateOnBehalfOfRecipient(input: $input) {
                                    invoice {
                                        paymentRequest
                                        satoshis
                                    }
                                    errors {
                                        message
                                    }
                                }
                            }
                        `,
                        variables: {
                            input: {
                                receiverUsername: username,
                                amount: 100,
                                memo: "Donation to Africa Free Routing"
                            }
                        }
                    })
                });

                const data = await response.json();

                if (data.errors && data.errors.length > 0) {
                    throw new Error(data.errors[0].message);
                }

                if (data.data.lnInvoiceCreateOnBehalfOfRecipient.errors.length > 0) {
                    throw new Error(data.data.lnInvoiceCreateOnBehalfOfRecipient.errors[0].message);
                }

                const invoice = data.data.lnInvoiceCreateOnBehalfOfRecipient.invoice;
                currentInvoice = invoice.paymentRequest;

                qrcode.innerHTML = '';
                await QRCode.toCanvas(document.createElement('canvas'), currentInvoice, {
                    width: 200,
                    margin: 0,
                    color: {
                        dark: '#000000',
                        light: '#ffffff'
                    }
                }, (err, canvas) => {
                    if (!err) {
                        qrcode.appendChild(canvas);
                    }
                });

                invoiceText.textContent = currentInvoice;
                qrContainer.classList.add('show');

            } catch (err) {
                showError(err.message || 'Failed to generate invoice');
            } finally {
                generateBtn.disabled = false;
                loading.classList.remove('show');
            }
        }

        function showError(message) {
            const error = document.getElementById('error');
            error.textContent = message;
            error.classList.add('show');
        }

        async function copyInvoice() {
            const copyBtn = document.getElementById('copyBtn');
            
            try {
                await navigator.clipboard.writeText(currentInvoice);
                copyBtn.textContent = 'Copied!';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.textContent = 'Copy Invoice';
                    copyBtn.classList.remove('copied');
                }, 2000);
            } catch (err) {
                const textArea = document.createElement('textarea');
                textArea.value = currentInvoice;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                copyBtn.textContent = 'Copied!';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.textContent = 'Copy Invoice';
                    copyBtn.classList.remove('copied');
                }, 2000);
            }
        }

        document.getElementById('username').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateInvoice();
            }
        });
    </script>
</body>
</html>
