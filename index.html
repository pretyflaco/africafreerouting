<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Africa Free Routing - Donate</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            text-align: center;
            color: #ffb703;
        }
        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 32px;
            font-size: 0.95rem;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
        }
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #ffb703;
            background: rgba(255, 255, 255, 0.12);
        }
        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .amount-display {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            color: #ffb703;
            margin: 24px 0;
        }
        .amount-display span {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 400;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ffb703 0%, #fb8500 100%);
            color: #1a1a2e;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 183, 3, 0.3);
        }
        .qr-container {
            display: none;
            margin-top: 30px;
            text-align: center;
        }
        .qr-container.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #qrcode {
            display: inline-block;
            padding: 16px;
            background: #fff;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        #qrcode canvas {
            display: block;
        }
        .invoice-text {
            background: rgba(255, 255, 255, 0.08);
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            word-break: break-all;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 16px;
            text-align: center;
        }
        .btn-copy {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 24px;
        }
        .btn-copy:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        .btn-copy.copied {
            background: #22c55e;
            border-color: #22c55e;
        }
        .instructions {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            text-align: left;
        }
        .instructions h3 {
            color: #ffb703;
            font-size: 1rem;
            margin-bottom: 12px;
        }
        .instructions ol {
            padding-left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            line-height: 1.8;
        }
        .instructions li {
            margin-bottom: 4px;
        }
        .footer {
            margin-top: 40px;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
        }
        .footer a {
            color: #ffb703;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Africa Free Routing</h1>
        <p class="subtitle">Support Bitcoin Lightning payments in Africa</p>
        
        <div class="input-group">
            <label for="username">Blink Username</label>
            <input type="text" id="username" placeholder="Enter Blink username" value="pretyflaco" onchange="updateQR()">
        </div>
        
        <div class="amount-display">
            100 <span>sats</span>
        </div>
        
        <button class="btn btn-primary" onclick="generateQR()">
            Show Payment QR
        </button>
        
        <div class="qr-container" id="qrContainer">
            <div id="qrcode"></div>
            <div class="invoice-text" id="invoiceText"></div>
            <button class="btn btn-copy" id="copyBtn" onclick="copyAddress()">
                Copy Lightning Address
            </button>
        </div>
        
        <div class="instructions" id="instructions">
            <h3>How to Donate</h3>
            <ol>
                <li>Scan the QR code with your Lightning wallet</li>
                <li>Or copy the Lightning address and paste in your wallet</li>
                <li>Send 100 sats to complete your donation</li>
            </ol>
        </div>
        
        <div class="footer">
            Powered by <a href="https://blink.sv" target="_blank">Blink</a>
        </div>
    </div>

    <script>
        let currentAddress = '';

        async function generateQR() {
            const username = document.getElementById('username').value.trim();
            const qrContainer = document.getElementById('qrContainer');
            const qrcode = document.getElementById('qrcode');
            const invoiceText = document.getElementById('invoiceText');

            if (!username) {
                alert('Please enter a Blink username');
                return;
            }

            currentAddress = username + '@blink.sv';
            
            qrcode.innerHTML = '';
            await QRCode.toCanvas(document.createElement('canvas'), 'lightning:' + currentAddress, {
                width: 200,
                margin: 0,
                color: {
                    dark: '#000000',
                    light: '#ffffff'
                }
            }, (err, canvas) => {
                if (!err) {
                    qrcode.appendChild(canvas);
                }
            });

            invoiceText.textContent = currentAddress;
            qrContainer.classList.add('show');
        }

        function updateQR() {
            const qrContainer = document.getElementById('qrContainer');
            qrContainer.classList.remove('show');
        }

        async function copyAddress() {
            const copyBtn = document.getElementById('copyBtn');
            
            try {
                await navigator.clipboard.writeText(currentAddress);
                copyBtn.textContent = 'Copied!';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.textContent = 'Copy Lightning Address';
                    copyBtn.classList.remove('copied');
                }, 2000);
            } catch (err) {
                const textArea = document.createElement('textarea');
                textArea.value = currentAddress;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                copyBtn.textContent = 'Copied!';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.textContent = 'Copy Lightning Address';
                    copyBtn.classList.remove('copied');
                }, 2000);
            }
        }

        document.getElementById('username').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateQR();
            }
        });
    </script>
</body>
</html>
